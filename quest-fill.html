<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest - เติมคำ</title>
<link rel="stylesheet" href="game.css">
</head>
<body data-mode="fill">

<div class="top-bar top-bar--page">
  <button id="backBtn" class="back-btn" type="button" onclick="location.href='quest.html'">← ย้อนกลับ</button>
  <div class="top-bar__title">✍️ เติมคำ</div>
  <div class="top-bar__spacer"></div>
</div>

<div class="center-panel">
  <div class="hero-card quest-shell">
    <div class="quest-status">
      <div class="quest-badge">✍️</div>
      <div class="quest-score">คะแนน: <span id="score">0</span></div>
    </div>

    <div id="gameContent" class="game-content"></div>
    <button class="secondary-btn" type="button" onclick="location.href='quest.html'">กลับเมนู</button>
  </div>
</div>

<script src="quest-mode.js"></script>
</body>
</html>
