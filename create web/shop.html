<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Shop</title>
<link rel="stylesheet" href="game.css">
</head>
<body>

<div class="top-bar top-bar--page">
  <button id="backBtn" class="back-btn" type="button" onclick="history.back()">← ย้อนกลับ</button>
  <div class="top-bar__title">🛒 Shop</div>
  <div class="top-bar__spacer"></div>
</div>

<div class="center-panel">
  <div class="hero-card">

    <button onclick="buy('shield')">🛡 โล่</button>
    <button onclick="buy('steal')">🪙 ขโมยแต้ม</button>
    <button onclick="buy('box')">🎁 กล่องสุ่ม</button>

    <p id="result"></p>

  </div>
</div>

<script type="module" src="shop.js"></script>
</body>
</html>
