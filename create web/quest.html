<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Mode</title>

<link rel="stylesheet" href="game.css">

</head>
<body>

<div class="top-bar top-bar--page">

  <button
    id="backBtn"
    class="back-btn"
    type="button"
    onclick="location.href='game.html'">

    ← ย้อนกลับ

  </button>

  <div class="top-bar__title">
    ⚔️ Quest Mode
  </div>

  <div class="top-bar__spacer"></div>

  <a
    href="quest-admin.html"
    class="quest-admin-fab"
    title="ไปหน้าแอดมินเควส">

    🛠️

  </a>

</div>

<div class="center-panel">

  <div class="hero-card quest-shell">

    <div class="quest-header">

      <div class="quest-badge">
        🎮
      </div>

      <h2>
        เควสทั้งหมด
      </h2>

      <p>
        เลือกเควสที่ต้องการเล่น
      </p>

    </div>

    <!-- เควสจาก Firebase จะมาแสดงตรงนี้ -->
    <div
      id="questList"
      class="quest-list">

      <div class="loading-card">

        กำลังโหลดเควส...

      </div>

    </div>

  </div>

</div>

<script type="module" src="quest.js"></script>

</body>
</html>
