<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Quest - Create Character</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4F46E5,#7C3AED);
    overflow:hidden;
}

.bg-circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
}

.circle1{
    width:250px;
    height:250px;
    top:-50px;
    left:-50px;
}

.circle2{
    width:300px;
    height:300px;
    bottom:-100px;
    right:-100px;
}

.container{
    width:90%;
    max-width:400px;
    background:white;
    padding:35px 30px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    font-size:52px;
}

.game-title{
    font-size:34px;
    font-weight:800;
    color:#4F46E5;
    margin-top:10px;
}

.subtitle{
    color:#777;
    font-size:14px;
    margin-bottom:25px;
}

.character-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:10px;
}

.character-desc{
    color:#666;
    font-size:14px;
    margin-bottom:20px;
}

label{
    display:block;
    text-align:left;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #e5e7eb;
    border-radius:14px;
    margin-bottom:18px;
    font-size:15px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#7C3AED;
}

.error{
    display:none;
    color:#ef4444;
    font-weight:600;
    margin-bottom:15px;
}

.start-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#4F46E5,#7C3AED);
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.start-btn:hover{
    transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="container">

<div class="logo">⚔️</div>

<div class="game-title">Word Quest</div>

<div class="subtitle">
    Adventure Through Words
</div>

<div class="character-title">
    Create Character
</div>

<div class="character-desc">
    ตั้งชื่อนักผจญภัยของคุณ
</div>

<label>Character Name</label>

<input
    id="characterName"
    type="text"
    maxlength="20"
    placeholder="เช่น ShadowKnight"
>

<p id="error" class="error"></p>

<button
    class="start-btn"
    onclick="createCharacter()">
    Start
</button>

</div>

<script type="module" src="charactor.js"></script>

</body>
</html>
