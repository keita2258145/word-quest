
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Quest - Sign Up</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
html,
body{
    width:100%;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:400px;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4F46E5,#7C3AED);
    overflow:hidden;
    padding:12px;
}

.container{
    width:90%;
    max-width:400px;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    font-size:50px;
}

.game-title{
    text-align:center;
    font-size:34px;
    font-weight:800;
    color:#4F46E5;
    margin-top:10px;
}

.subtitle{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

.signup-title{
    text-align:center;
    font-size:26px;
    font-weight:700;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input,select{
    width:100%;
    padding:14px;
    border:2px solid #e5e7eb;
    border-radius:14px;
    margin-bottom:18px;
    font-size:15px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#7C3AED;
}

.signup-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#4F46E5,#7C3AED);
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
}
.success-btn{
    background:#22c55e !important;
    color:white !important;
}
.back-btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:2px solid #7C3AED;
    background:white;
    color:#7C3AED;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
}

</style>
</head>

<body class="no-scroll">

<div class="container">

    <div class="logo">🏆</div>

    <div class="game-title">
        Word Quest
    </div>

    <div class="subtitle">
        Adventure Through Words
    </div>

    <div class="signup-title">
        Sign Up
    </div>

    <label>Username</label>
    <input id="name" type="text" placeholder="กรอกชื่อจริง" >


    <label>Select Class</label>
    <select id="grade">
        <option>ม.1</option>
        <option>ม.2</option>
        <option>ม.3</option>
        <option>ม.4/1</option>
        <option>ม.4/2</option>
        <option>ม.4/3</option>
        <option>ม.4/4</option>
        <option>ม.5/1</option>
        <option>ม.5/2</option>
        <option>ม.5/3</option>
        <option>ม.5/4</option>
        <option>ม.6/1</option>
        <option>ม.6/2</option>
        <option>ม.6/3</option>
        <option>ม.6/4</option>
        <option>ม.6/5</option>
    </select>
<p id="error"
style="
display:none;
color:red;
font-weight:600;
margin-bottom:15px;">
</p>

<button id="signupBtn" class="signup-btn"onclick="signup()">
    ยืนยัน
</button>
<button
class="back-btn"
onclick="window.location.href='index.html'">
    กลับหน้า Login
</button>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
