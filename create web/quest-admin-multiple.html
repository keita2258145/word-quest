<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Admin - เลือกคำตอบ</title>
  <link rel="stylesheet" href="game.css" />
</head>
<body>

  <div class="top-bar top-bar--page">
    <button id="backBtn" class="back-btn" type="button"
      onclick="location.href='quest-admin.html'">
      ← ย้อนกลับ
    </button>

    <div class="top-bar__title">🧠 เลือกคำตอบ</div>
    <div class="top-bar__spacer"></div>
  </div>

  <div class="center-panel">
    <div class="hero-card quest-shell">

      <!-- STEP 1 -->
      <div id="stepIntro" class="quest-admin-step">
        <div class="quest-badge">📝</div>
        <h2>สร้างคำถาม</h2>

        <select id="countSelect" class="count-select" required>
          <option value="">-- เลือกจำนวนข้อ --</option>
          <option value="10">10 ข้อ</option>
          <option value="15">15 ข้อ</option>
          <option value="20">20 ข้อ</option>
        </select>
      </div>

      <!-- STEP 2 -->
      <div id="stepQuestion" class="quest-admin-step hidden">

        <div class="step-heading">
          <div class="step-pill" id="stepLabel">ข้อ 1 / 10</div>
          <h3>ตั้งคำถาม</h3>
        </div>

        <form id="questionForm" class="quest-admin-form">

          <input id="questionInput" type="text" placeholder="คำถาม" required />

          <div class="option-grid">
            <input id="option1" type="text" placeholder="ตัวเลือกที่ 1" required />
            <input id="option2" type="text" placeholder="ตัวเลือกที่ 2" required />
            <input id="option3" type="text" placeholder="ตัวเลือกที่ 3" required />
            <input id="option4" type="text" placeholder="ตัวเลือกที่ 4" required />
          </div>

          <select id="correctInput" required>
            <option value="">เลือกคำตอบที่ถูกต้อง</option>
            <option value="1">ตัวเลือกที่ 1</option>
            <option value="2">ตัวเลือกที่ 2</option>
            <option value="3">ตัวเลือกที่ 3</option>
            <option value="4">ตัวเลือกที่ 4</option>
          </select>

          <textarea id="explanationInput" rows="3"
            placeholder="คำอธิบายคำตอบ"></textarea>

          <!-- 🔥 ปุ่มด้านล่าง -->
          <div class="nav-buttons">

            <button type="button" id="backStepBtn" class="back-btn">
              ← ย้อนกลับ
            </button>

            <button type="submit" class="mode-btn">
              ถัดไป →
            </button>

          </div>

        </form>
      </div>

      <div id="messageBox" class="message-box"></div>

    </div>
  </div>

  <script type="module" src="quest-admin-multiple.js"></script>

</body>
</html>
