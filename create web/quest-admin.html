<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Admin</title>
<link rel="stylesheet" href="game.css">
</head>
<body>

<div class="top-bar top-bar--page">

  <button
    class="back-btn"
    onclick="location.href='quest-multiple.html'">

    ← ย้อนกลับ

  </button>

  <div class="top-bar__title">
    🛠️ Quest Admin
  </div>

  <div class="top-bar__spacer"></div>

</div>

<div class="center-panel">

  <div class="hero-card quest-shell quest-admin-shell">

    <div class="quest-header">

      <div class="quest-badge">
        🧩
      </div>

      <h2>เพิ่มเควสใหม่</h2>

      <p>
        เลือกประเภทเกมที่ต้องการสร้าง
      </p>

    </div>

    <div class="quest-admin-choice-card">

      <h3>
        เลือกประเภทเกม
      </h3>

      <a
        class="mode-btn"
        href="quest-admin-multiple.html">

        🧠 เลือกคำตอบ

      </a>

    </div>

    <div class="quest-admin-choice-card">

      <a
        class="mode-btn"
        href="quest-admin-fill.html">

        ✍️ เติมคำ

      </a>

    </div>

    <div class="quest-admin-choice-card">

      <a
        class="mode-btn"
        href="quest-admin-speed.html">

        ⚡ ความเร็ว

      </a>

    </div>

    <hr class="admin-divider">

    <h2>
      📚 เควสที่สร้างแล้ว
    </h2>

    <div id="questAdminList">

      <div class="loading-card">

        กำลังโหลดเควส...

      </div>

    </div>

  </div>

</div>

<script type="module" src="quest-admin.js"></script>

</body>
</html>
